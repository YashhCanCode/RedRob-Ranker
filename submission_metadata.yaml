ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Claude (Cowork) was used as a pair-programmer for architecture discussion,
  drafting the scoring modules, and code review. All design decisions — the
  feature set, weights, honeypot heuristics, and the TF-IDF latency/quality
  tradeoff — are the team's own and are documented in the deck and README.
  No candidate data was ever sent to any hosted LLM, and the ranking step makes
  zero network calls.

methodology_summary: |
  Hybrid, fully-offline ranker. Seven explainable components — title fit,
  trust-weighted skills, career evidence (product-company + shipped
  ranking/search/recsys), TF-IDF semantic similarity to a JD-derived query,
  experience-band fit, domain (NLP/IR vs CV/speech), and location — are combined
  into a merit score, then modulated by two multipliers: explicit JD
  disqualifiers (consulting-only, research-only, title-chasing, CV/speech-only,
  stale IC) and behavioral availability (recruiter response rate, recency,
  open-to-work, notice). Honeypots are caught by internal-consistency checks
  (duration vs date span, tenure vs experience, expert proficiency with 0 months
  usage) and forced below all genuine fits. The title signal and the
  endorsement/duration skill-trust multiplier are what defeat keyword-stuffers;
  career-description text lets plain-language strong candidates surface without
  the buzzwords. Runs in ~1 min for 100k candidates on CPU, no network.

declarations:
  read_submission_spec: true
